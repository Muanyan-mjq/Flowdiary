name: iOS Build

# iOS 自动构建流程
# 使用 GitHub Actions macOS 虚拟机，在 Windows 开发环境下也能构建 iOS 安装包
#
# 构建产物：无签名 IPA（可通过 AltStore 等侧载工具安装）
# 如需正式分发，需配置 Apple Developer 证书和描述文件

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 验证 Flutter 环境
        run: flutter doctor -v

      - name: 安装依赖
        run: flutter pub get

      - name: 安装 CocoaPods 依赖
        working-directory: ios
        run: |
          pod install --repo-update
        # 如果 pod install 失败（网络问题），尝试用 flutter precache 后重试
        continue-on-error: false

      - name: 静态分析（可选，非阻塞）
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      # ============================================
      # 方式一：无签名构建（侧载/测试用，默认启用）
      # 产物可用 AltStore / SideStore 安装
      # ============================================
      - name: 构建 iOS（无签名）
        run: |
          flutter build ios --release --no-codesign
        env:
          FLUTTER_XCODE_CODE_SIGN_STYLE: Manual

      - name: 打包为 IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -r ../../../sui_xin_ye_unsigned.ipa Payload
          cd ../../..
          echo "✅ IPA 已生成: sui_xin_ye_unsigned.ipa"
          ls -lh sui_xin_ye_unsigned.ipa

      - name: 上传 IPA（无签名版）
        uses: actions/upload-artifact@v5
        with:
          name: sui_xin_ye-ios-unsigned
          path: sui_xin_ye_unsigned.ipa
          retention-days: 7

      # ============================================
      # 方式二：签名构建（App Store / Ad-Hoc，需配置 Secrets）
      # 如需启用，取消下方注释并配置对应 GitHub Secrets
      # ============================================
      # - name: 配置代码签名
      #   if: env.HAS_SIGNING == 'true'
